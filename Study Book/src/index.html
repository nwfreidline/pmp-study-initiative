<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP Exam Prep — Study Book</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf9;--fg:#1c1917;--muted:#78716c;--accent:#b45309;
  --accent-light:#fef3c7;--border:#e7e5e4;--sidebar-bg:#f5f5f4;
  --card-bg:#fff;--success:#16a34a;--page-max:780px;
}
html{font-size:17px;scroll-behavior:smooth}
body{font-family:'Georgia','Times New Roman',serif;color:var(--fg);background:var(--bg);line-height:1.75;display:flex;min-height:100vh}

/* Sidebar */
#sidebar{width:300px;min-width:300px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:1.2rem;overflow-y:auto;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
#sidebar h1{font-size:1.1rem;color:var(--accent);margin-bottom:.3rem;font-family:system-ui,sans-serif}
#sidebar .subtitle{font-size:.75rem;color:var(--muted);margin-bottom:1rem;font-family:system-ui,sans-serif}
#sidebar .progress-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:1.2rem;overflow:hidden}
#sidebar .progress-fill{height:100%;background:var(--success);border-radius:3px;transition:width .4s}
#sidebar .progress-text{font-size:.7rem;color:var(--muted);margin-top:-.8rem;margin-bottom:1rem;text-align:right;font-family:system-ui,sans-serif}
.toc-chapter{font-size:.75rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-top:1rem;margin-bottom:.3rem;font-family:system-ui,sans-serif}
.toc-item{display:flex;align-items:center;gap:.4rem;padding:.35rem .5rem;border-radius:6px;cursor:pointer;font-size:.8rem;color:var(--fg);font-family:system-ui,sans-serif;transition:background .15s;text-decoration:none}
.toc-item:hover{background:var(--border)}
.toc-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.toc-item .check{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem}
.toc-item.read .check{border-color:var(--success);background:var(--success);color:#fff}

/* Main */
#main{margin-left:300px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#content{max-width:var(--page-max);margin:0 auto;padding:2.5rem 2rem 4rem;flex:1;width:100%}

/* Typography */
#content h1{font-size:1.8rem;margin-bottom:.5rem;color:var(--accent);line-height:1.3}
#content h2{font-size:1.35rem;margin-top:2rem;margin-bottom:.6rem;color:var(--fg);border-bottom:2px solid var(--accent-light);padding-bottom:.3rem}
#content h3{font-size:1.1rem;margin-top:1.5rem;margin-bottom:.4rem;color:var(--accent)}
#content p{margin-bottom:1rem}
#content ul,#content ol{margin-bottom:1rem;padding-left:1.5rem}
#content li{margin-bottom:.35rem}
#content strong{color:var(--fg)}
#content em{color:var(--muted)}
#content blockquote{border-left:4px solid var(--accent);padding:.8rem 1rem;margin:1rem 0;background:var(--accent-light);border-radius:0 8px 8px 0;font-style:italic}
#content table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.9rem}
#content th{background:var(--accent);color:#fff;padding:.5rem .7rem;text-align:left;font-family:system-ui,sans-serif;font-size:.8rem}
#content td{padding:.45rem .7rem;border-bottom:1px solid var(--border)}
#content tr:nth-child(even){background:#fafaf9}
#content code{background:var(--accent-light);padding:.15rem .35rem;border-radius:4px;font-size:.85rem;font-family:'Consolas','Courier New',monospace}
.callout{background:var(--accent-light);border:1px solid #fbbf24;border-radius:8px;padding:1rem 1.2rem;margin:1.2rem 0}
.callout-title{font-weight:700;font-family:system-ui,sans-serif;font-size:.85rem;color:var(--accent);margin-bottom:.3rem}
.key-point{background:#ecfdf5;border-left:4px solid var(--success);padding:.6rem 1rem;margin:1rem 0;border-radius:0 6px 6px 0;font-size:.95rem}

/* Nav bar */
#nav-bar{position:sticky;bottom:0;background:var(--card-bg);border-top:1px solid var(--border);padding:.8rem 2rem;display:flex;justify-content:space-between;align-items:center;font-family:system-ui,sans-serif;z-index:50}
#nav-bar button{padding:.5rem 1.2rem;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);cursor:pointer;font-size:.85rem;font-family:system-ui,sans-serif;transition:all .15s}
#nav-bar button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#nav-bar button:disabled{opacity:.3;cursor:default;background:var(--card-bg);color:var(--fg)}
#nav-bar .page-info{font-size:.8rem;color:var(--muted)}
#mark-read{background:var(--success)!important;color:#fff!important;border-color:var(--success)!important}
#mark-read:hover{opacity:.85}
#mark-read.is-read{background:var(--card-bg)!important;color:var(--success)!important;border-color:var(--success)!important}

/* Mobile */
#menu-toggle{display:none;position:fixed;top:.8rem;left:.8rem;z-index:200;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;cursor:pointer;font-size:1.1rem}
@media(max-width:800px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  #menu-toggle{display:block}
  #content{padding:2rem 1.2rem 4rem}
}
</style>
</head>
<body>
<button id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<nav id="sidebar">
  <h1>📘 PMP Study Book</h1>
  <div class="subtitle">Week 1: Foundation</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">0 / 0 pages read</div>
  <div id="toc"></div>
</nav>
<div id="main">
  <div id="content"></div>
  <div id="nav-bar">
    <button id="btn-prev" onclick="navigate(-1)">← Previous</button>
    <span class="page-info" id="page-info"></span>
    <button id="mark-read" onclick="toggleRead()">Mark as Read ✓</button>
    <button id="btn-next" onclick="navigate(1)">Next →</button>
  </div>
</div>
<script src="pages.js"></script>
<script>
let currentPage = 0;
const STORAGE_KEY = 'pmp-study-book-progress';

function getReadPages() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function setReadPages(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}
function isRead(idx) { return getReadPages().includes(idx); }
function toggleRead() {
  const arr = getReadPages();
  const i = arr.indexOf(currentPage);
  if (i > -1) arr.splice(i, 1); else arr.push(currentPage);
  setReadPages(arr);
  renderTOC();
  updateNav();
}
function navigate(dir) {
  const next = currentPage + dir;
  if (next >= 0 && next < defined_pages.length) { currentPage = next; render(); }
}
function goToPage(idx) {
  currentPage = idx;
  render();
  document.getElementById('sidebar').classList.remove('open');
}
function render() {
  const page = defined_pages[currentPage];
  document.getElementById('content').innerHTML = page.html;
  window.scrollTo({top: 0});
  updateNav();
  renderTOC();
}
function updateNav() {
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage === defined_pages.length - 1;
  document.getElementById('page-info').textContent = `Page ${currentPage + 1} of ${defined_pages.length}`;
  const mr = document.getElementById('mark-read');
  if (isRead(currentPage)) { mr.textContent = '✓ Read'; mr.classList.add('is-read'); }
  else { mr.textContent = 'Mark as Read ✓'; mr.classList.remove('is-read'); }
}
function renderTOC() {
  let html = '';
  let lastChapter = '';
  const readArr = getReadPages();
  const total = defined_pages.length;
  const readCount = readArr.length;
  defined_pages.forEach((p, i) => {
    if (p.chapter !== lastChapter) {
      html += `<div class="toc-chapter">${p.chapter}</div>`;
      lastChapter = p.chapter;
    }
    const active = i === currentPage ? ' active' : '';
    const read = readArr.includes(i) ? ' read' : '';
    html += `<div class="toc-item${active}${read}" onclick="goToPage(${i})"><span class="check">${readArr.includes(i)?'✓':''}</span>${p.title}</div>`;
  });
  document.getElementById('toc').innerHTML = html;
  document.getElementById('progress-fill').style.width = `${(readCount/total*100).toFixed(0)}%`;
  document.getElementById('progress-text').textContent = `${readCount} / ${total} pages read`;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});
// Initialize
render();
</script>
</body>
</html>
